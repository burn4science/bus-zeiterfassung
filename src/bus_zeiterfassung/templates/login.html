<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Anmelden - Zeiterfassung</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">
<form method="post" action="/login" class="bg-white rounded-2xl shadow p-6 w-80 space-y-4">
    <h1 class="text-xl font-semibold text-center">Zeiterfassung</h1>
    {% if error %}
    <p class="text-sm text-red-600 text-center">{{ error }}</p>
    {% endif %}
    <label class="block">
        <span class="text-sm text-slate-600">PIN</span>
        <input name="pin" type="password" inputmode="numeric" autocomplete="current-password"
               class="mt-1 w-full border rounded-lg px-3 py-2 text-lg tracking-widest text-center"
               required autofocus>
    </label>
    <button class="w-full bg-blue-900 text-white rounded-lg py-2 font-medium hover:bg-blue-800">
        Anmelden
    </button>
</form>
</body>
</html>
