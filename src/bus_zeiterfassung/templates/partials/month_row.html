<tr id="row-{{ e.id }}" x-data="{ edit: false }" class="hover:bg-slate-50 transition-colors">
    <td x-show="!edit" class="px-3 py-2.5 text-sm font-medium text-slate-700 whitespace-nowrap">{{ e.day.strftime('%d.%m.') }}</td>
    <td x-show="!edit" class="px-3 py-2.5 text-sm font-mono tabular-nums text-slate-600">{{ e.start.strftime('%H:%M') if e.start else '–' }}</td>
    <td x-show="!edit" class="px-3 py-2.5 text-sm font-mono tabular-nums text-slate-600">{{ e.end.strftime('%H:%M') if e.end else '…' }}</td>
    <td x-show="!edit" class="px-3 py-2.5 text-xs text-slate-400 max-w-0 truncate">{{ e.note or '' }}</td>
    <td x-show="!edit" class="px-3 py-2.5">
        <div class="flex gap-1.5 justify-end items-center">
            <button @click="edit = true"
                    title="Bearbeiten"
                    class="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-200 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
                </svg>
            </button>
            <button hx-post="/entries/{{ e.id }}/delete"
                    hx-target="#row-{{ e.id }}" hx-swap="outerHTML"
                    hx-confirm="Eintrag wirklich löschen?"
                    class="text-xs px-2.5 py-1 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 transition-colors font-medium">
                Löschen
            </button>
        </div>
    </td>
    <td x-show="edit" colspan="5" class="px-3 py-2">
        <form hx-post="/entries/{{ e.id }}/update"
              hx-target="#row-{{ e.id }}" hx-swap="outerHTML"
              class="grid grid-cols-[auto_auto_auto_1fr] gap-x-2 gap-y-2 text-sm items-center">
            <input type="date" name="day" value="{{ e.day.isoformat() }}" required
                   class="border border-slate-200 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="time" name="start" value="{{ e.start.strftime('%H:%M') if e.start else '' }}" required
                   class="border border-slate-200 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="time" name="end" value="{{ e.end.strftime('%H:%M') if e.end else '' }}"
                   class="border border-slate-200 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="text" name="note" value="{{ e.note or '' }}" placeholder="Notiz"
                   class="border border-slate-200 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500 min-w-0">
            <div class="col-span-4 flex gap-1 justify-end">
                <button class="text-xs px-3 py-1.5 rounded-lg bg-blue-700 text-white hover:bg-blue-600 font-medium">Speichern</button>
                <button type="button" @click="edit = false"
                        class="text-xs px-3 py-1.5 rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 font-medium">Abbrechen</button>
            </div>
        </form>
    </td>
</tr>
