{% extends "base.html" %}
{% block title %}Erfassen - Zeiterfassung{% endblock %}
{% block content %}
<div id="today-card">
    {% include "partials/today_card.html" %}
</div>

<section class="mt-5 bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
    <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-widest mb-4">Manueller Eintrag</h2>
    <form hx-post="/entries" hx-target="#today-card" hx-swap="innerHTML" class="grid grid-cols-2 gap-3">
        <label class="col-span-2 text-sm font-medium text-slate-700">
            Datum
            <input type="date" name="day" value="{{ today.isoformat() }}" required
                   class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
        <label class="text-sm font-medium text-slate-700">
            Start
            <input type="time" name="start" required
                   class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
        <label class="text-sm font-medium text-slate-700">
            Ende
            <input type="time" name="end"
                   class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
        <label class="col-span-2 text-sm font-medium text-slate-700">
            Bemerkung <span class="text-slate-400 font-normal">(optional)</span>
            <input type="text" name="note"
                   class="mt-1 w-full border border-slate-200 rounded-lg px-3 py-2 text-slate-900 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </label>
        <button class="col-span-2 bg-blue-900 text-white rounded-xl py-2.5 mt-1 font-medium hover:bg-blue-800 active:scale-[0.99] transition-all">
            Speichern
        </button>
    </form>
</section>
{% endblock %}
