name: bus-zeiterfassung

services:
  app:
    build: .
    container_name: bus-zeiterfassung
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      - PIN_HASH
      - SECRET_KEY
      - TZ
      - EMPLOYEE_NAME
      - TEMPLATE_PATH
      - DATABASE_URL
      - EXPORT_DIR
    ports:
      - "8888:8888"
    volumes:
      - bus_app_data:/app/data

volumes:
  bus_app_data:
